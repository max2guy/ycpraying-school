<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#FFB8D4"/>
      <stop offset="60%" stop-color="#FF85B0"/>
      <stop offset="100%" stop-color="#E05090"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 배경 원 -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>

  <!-- 광택 하이라이트 -->
  <ellipse cx="80" cy="62" rx="38" ry="22" fill="rgba(255,255,255,0.22)"/>

  <!-- 십자가 그림자 (부드러운 깊이감) -->
  <g opacity="0.18" transform="translate(4,5)">
    <rect x="84" y="43" width="24" height="106" rx="12" fill="#7A1040"/>
    <rect x="60" y="68" width="72" height="24" rx="12" fill="#7A1040"/>
  </g>

  <!-- 카와이 십자가 (둥글둥글한 끝) -->
  <rect x="84" y="43" width="24" height="106" rx="12" fill="white"/>
  <rect x="60" y="68" width="72" height="24" rx="12" fill="white"/>

  <!-- 작은 반짝이 (카와이 포인트) -->
  <g fill="white" opacity="0.7">
    <circle cx="44" cy="52" r="3.5"/>
    <circle cx="38" cy="64" r="2"/>
    <circle cx="50" cy="40" r="2"/>
    <circle cx="148" cy="52" r="3.5"/>
    <circle cx="154" cy="64" r="2"/>
    <circle cx="142" cy="40" r="2"/>
  </g>
  <g fill="white" opacity="0.5">
    <circle cx="40" cy="44" r="1.5"/>
    <circle cx="152" cy="44" r="1.5"/>
  </g>

</svg>
